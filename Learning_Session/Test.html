<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      width: 100px;
      height: 100px;
    }

    .menu ul {
      display: flex;
      list-style: none;
      gap: 50px;
    }

    .menu ul li a {
      text-decoration: none;
    }

    .menu ul li button a {
      text-decoration: none;
      color: white;

    }

    .menu ul li button {
      background-color: rgb(110, 123, 241);
      border-radius: 20px;
      width: 180px;
      height: 30px;
      border: 1px solid white;
    }

    .maincontainer {
      background-image: url(hospital.jpg);
      height: 500px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .maincontainer h1 {
      color: white;
      text-shadow: 3px 3px 15px black;
      font-size: 78px;

    }

    .footer-text {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
    }

    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 15px;
    }
    @media (max-width: 768px) {

  .container {
    flex-direction: column;
    text-align: center;
  }

  .logo {
    flex-direction: column;
  }

  .menu ul {
    flex-direction: column;
    gap: 15px;
    padding: 0;
  }

  .menu ul li button {
    width: 100%;
    max-width: 200px;
  }

  .maincontainer h1 {
    font-size: 40px;
    text-align: center;
    padding: 0 20px;
  }

  .footer-text {
    font-size: 14px;
    padding: 0 10px;
  }
}
  </style>
</head>

<body>
  <nav>
    <div class="container">
      <div class="logo">
        <img src="pillaiyar.png">
        <h1>Get Well Hospital</h1>
      </div>
      <div class="menu">
        <ul>
          <li><a href="">Home</a></li>
          <li><a href="">About US</a></li>
          <li><a href="">Our services</a></li>
          <li><button><a href="">Making Appointment</a></button></li>
        </ul>
      </div>
    </div>
  </nav>
  <main>
    <div class="maincontainer">
      <h1>Your Health is our wealth</h1>
    </div>
    <div class="footer-text">
      <p>24/7 Emergency Care | Call: +94 21 123 4567</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Get Well Hospital. All Rights Reserved.</p>
  </footer>
</body>

</html>
